<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMUNIC · Authentification</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script>
    // Sécurité : redirection si déjà connecté
    if (sessionStorage.getItem('comunic_token')) {
      window.location.href = '/';
    }
  </script>
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <h1>COMUNIC</h1>
        <p class="auth-subtitle">Network Monitor PRO</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <form id="loginForm" class="auth-form active" style="display: flex;">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="nom@comunic.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="auth-btn">Se connecter</button>
      </form>

      <form id="registerForm" class="auth-form" style="display: none;">
        <div class="form-group">
          <label for="regUsername">Nom d'utilisateur</label>
          <input type="text" id="regUsername" required placeholder="jdupont" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" required placeholder="nom@comunic.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regPassword">Mot de passe</label>
          <input type="password" id="regPassword" required minlength="6" placeholder="6 caractères min." autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="regPasswordConfirm">Confirmer le mot de passe</label>
          <input type="password" id="regPasswordConfirm" required placeholder="••••••••" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn">Créer mon compte</button>
      </form>

      <div id="authMessage"></div>

      <p class="auth-footer">
        🔒 Prototype local · En prod : authentification AD/LDAP
      </p>

    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');
    const msgBox = document.getElementById('authMessage');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // On cache tous les formulaires proprement
        forms.forEach(f => {
          f.classList.remove('active');
          f.style.display = 'none';
        });
        
        // On affiche le bon formulaire sélectionné
        const targetForm = document.getElementById(tab.dataset.tab + 'Form');
        if (targetForm) {
          targetForm.classList.add('active');
          targetForm.style.display = 'flex';
        }
        
        msgBox.textContent = '';
        msgBox.className = '';
      });
    });

    function showMessage(text, type = 'error') {
      msgBox.textContent = text;
      msgBox.className = type;
    }

    // Requête de Connexion
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      try {
        const r = await fetch('/auth/login', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (!r.ok) return showMessage(data.error || 'Identifiants incorrects', 'error');

        sessionStorage.setItem('comunic_token', data.token);
        sessionStorage.setItem('comunic_username', data.username);
        sessionStorage.setItem('comunic_role', data.role);
        
        showMessage('Connexion réussie, redirection...', 'success');
        setTimeout(() => window.location.href = '/', 600);
      } catch (err) {
        showMessage('Erreur réseau : ' + err.message, 'error');
      }
    });

    // Requête d'Inscription
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regPasswordConfirm').value;

      if (password !== confirm) {
        return showMessage('Les mots de passe ne correspondent pas', 'error');
      }

      try {
        const r = await fetch('/auth/register', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ username, email, password })
        });
        const data = await r.json();
        if (!r.ok) return showMessage(data.error || 'Erreur lors de l\'inscription', 'error');

        sessionStorage.setItem('comunic_token', data.token);
        sessionStorage.setItem('comunic_username', data.username);
        sessionStorage.setItem('comunic_role', data.role);
        
        showMessage(`Compte créé [${data.role.toUpperCase()}], redirection...`, 'success');
        setTimeout(() => window.location.href = '/', 800);
      } catch (err) {
        showMessage('Erreur réseau : ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
